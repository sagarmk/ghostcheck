name: CI

on:
  push:
    branches: [main]
    paths:
      - 'ai-code-verifier/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ai-code-verifier/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: ai-code-verifier/

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: ai-code-verifier/node_modules
          key: ${{ runner.os }}-node-20-${{ hashFiles('ai-code-verifier/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: ai-code-verifier/node_modules
          key: ${{ runner.os }}-node-20-${{ hashFiles('ai-code-verifier/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: ai-code-verifier/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('ai-code-verifier/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate coverage report
        if: matrix.node-version == 20
        run: npx vitest run --coverage --coverage.thresholds.lines 0 --coverage.thresholds.functions 0 --coverage.thresholds.branches 0 --coverage.thresholds.statements 0

      - name: Upload coverage report
        if: matrix.node-version == 20 && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ai-code-verifier/coverage/
          retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: ai-code-verifier/node_modules
          key: ${{ runner.os }}-node-20-${{ hashFiles('ai-code-verifier/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build with TypeScript
        run: npx tsc

      - name: Verify dist/ output exists
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::dist/ directory not found after build"
            exit 1
          fi
          echo "dist/ contents:"
          find dist -type f | head -30
          echo "---"
          FILE_COUNT=$(find dist -type f | wc -l)
          echo "Total files in dist/: $FILE_COUNT"
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::dist/ is empty — build produced no output"
            exit 1
          fi

      - name: Verify CLI entry point
        run: node dist/cli/index.js --help

      - name: Verify package contents
        run: npm pack --dry-run 2>&1
